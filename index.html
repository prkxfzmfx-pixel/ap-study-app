<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AP学習記録">
<meta name="theme-color" content="#6d5ef0">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<title>応用情報 学習記録</title>
<style>
:root {
  --surface-1: #fcfcfb;
  --surface-2: #f2f1ee;
  --page: #f9f9f7;
  --ink-1: #0b0b0b;
  --ink-2: #52514e;
  --muted: #898781;
  --grid: #e1e0d9;
  --baseline: #c3c2b7;
  --border: rgba(11,11,11,0.10);
  --accent: #6d5ef0;         /* UIアクセント（学習テーマの紫） */
  --accent-2: #a99bff;
  --series-am: #2a78d6;      /* 午前（検証済みパレット slot1 blue） */
  --series-pm: #eb6834;      /* 午後（検証済みパレット slot6 orange） */
  --pass-line: #0ca30c;      /* 合格ライン60% */
  --danger: #d03b3b;
  --good: #0ca30c;
  --good-bg: rgba(12,163,12,0.12);
  --danger-bg: rgba(208,59,59,0.12);
  --hero-a: #6d5ef0;
  --hero-b: #8b5cf0;
}
@media (prefers-color-scheme: dark) {
  :root {
    --surface-1: #1a1a19;
    --surface-2: #232322;
    --page: #0d0d0d;
    --ink-1: #ffffff;
    --ink-2: #c3c2b7;
    --muted: #898781;
    --grid: #2c2c2a;
    --baseline: #383835;
    --border: rgba(255,255,255,0.10);
    --accent: #8b7dff;
    --accent-2: #6d5ef0;
    --series-am: #3987e5;
    --series-pm: #d95926;
    --pass-line: #0ca30c;
    --danger: #e66767;
    --good: #22b322;
    --good-bg: rgba(34,179,34,0.16);
    --danger-bg: rgba(230,103,103,0.16);
    --hero-a: #5b4fd6;
    --hero-b: #7c4fe0;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; height: 100%; }
body {
  font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
  background: var(--page);
  color: var(--ink-1);
  font-size: 16px;
  height: 100vh;
  height: var(--appH, 100dvh);
  display: flex;
  flex-direction: column;
  padding-top: var(--safe-top, env(safe-area-inset-top));
  overflow: hidden;
}
main {
  flex: 1 1 0;
  min-height: 0;
  width: 100%;
  max-width: 640px;
  margin: 0 auto;
  padding: 0 12px 24px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
h1 { font-size: 18px; padding: 14px 4px 6px; }
h2 { font-size: 14px; color: var(--ink-2); font-weight: 600; margin: 18px 4px 8px; }
.card {
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 10px;
}
button {
  font: inherit;
  color: var(--ink-1);
  background: var(--surface-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px 13px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
button.primary { background: var(--accent); color: #fff; border-color: transparent; font-weight: 600; }
button.ghost { background: transparent; border-color: transparent; color: var(--accent); }
button.danger { color: var(--danger); }
button:disabled { opacity: .5; }
input, select, textarea {
  font: inherit;
  color: var(--ink-1);
  background: var(--page);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 9px;
}
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
input[type="number"] { text-align: right; font-variant-numeric: tabular-nums; }
textarea { width: 100%; resize: vertical; min-height: 44px; }
.num { font-variant-numeric: tabular-nums; }

/* ボトムナビ */
nav {
  flex-shrink: 0;
  display: flex;
  background: var(--surface-1);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}
nav button {
  flex: 1; border: none; border-radius: 0; background: none;
  padding: 8px 0 6px; font-size: 10px; color: var(--muted);
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
nav button .ico { font-size: 20px; line-height: 1; }
nav button.active { color: var(--accent); font-weight: 600; }

/* ヒーロー（カウントダウン） */
.hero {
  background: linear-gradient(135deg, var(--hero-a), var(--hero-b));
  color: #fff; border-radius: 18px; padding: 22px 18px; margin: 6px 0 12px;
  text-align: center; box-shadow: 0 8px 24px rgba(109,94,240,0.28);
}
.hero .lbl { font-size: 13px; opacity: .9; }
.hero .big { font-size: 68px; font-weight: 800; line-height: 1; margin: 4px 0 2px; letter-spacing: -2px; font-variant-numeric: tabular-nums; }
.hero .big small { font-size: 26px; font-weight: 700; margin-left: 4px; letter-spacing: 0; }
.hero .exam { font-size: 14px; font-weight: 600; margin-top: 6px; }
.hero .date { font-size: 12px; opacity: .85; margin-top: 2px; }
.hero.passed .big { font-size: 34px; }

/* KPI */
.kpirow { display: flex; gap: 10px; margin-bottom: 12px; }
.kpi { flex: 1; background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 12px; text-align: center; }
.kpi .v { font-size: 26px; font-weight: 800; font-variant-numeric: tabular-nums; }
.kpi .v small { font-size: 13px; font-weight: 600; }
.kpi .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
.streak .v { color: var(--accent); }
.statgrid { display: flex; gap: 10px; }
.statgrid .kpi { flex: 1; }

/* ログフォーム */
.seg { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.seg button { flex: 1; border: none; border-radius: 0; background: var(--surface-1); color: var(--ink-2); padding: 9px 0; }
.seg button.on { background: var(--accent); color: #fff; font-weight: 600; }
.frow { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
.frow label { font-size: 13px; color: var(--ink-2); min-width: 4em; }
.frow input.qn { width: 90px; }
.frow .sep { color: var(--muted); }
.hint { font-size: 12px; color: var(--muted); margin-top: 4px; line-height: 1.6; }
.accbadge { display: inline-block; font-size: 12px; font-weight: 700; padding: 1px 7px; border-radius: 999px; }

/* ログ一覧 */
.logitem { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-top: 1px solid var(--grid); }
.logitem:first-child { border-top: none; }
.logitem .tag { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px; color: #fff; flex-shrink: 0; }
.logitem .tag.am { background: var(--series-am); }
.logitem .tag.pm { background: var(--series-pm); }
.logitem .mid { flex: 1; min-width: 0; }
.logitem .mid .d { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.logitem .mid .d .src { font-size: 10px; font-weight: 600; color: var(--accent); background: var(--surface-2); padding: 1px 6px; border-radius: 999px; }
.logitem .mid .m { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.logitem .sc { text-align: right; font-variant-numeric: tabular-nums; font-size: 14px; }
.logitem .sc b { font-size: 16px; }
.logitem .del { border: none; background: none; color: var(--muted); font-size: 16px; padding: 4px 6px; }
.empty { color: var(--muted); font-size: 14px; text-align: center; padding: 22px 8px; line-height: 1.7; }

/* カレンダー */
.cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.cal-head .ym { font-size: 17px; font-weight: 700; }
.cal-head button { min-width: 44px; }
table.cal { width: 100%; border-collapse: collapse; table-layout: fixed; }
table.cal th { font-size: 11px; color: var(--muted); font-weight: 500; padding: 4px 0; }
table.cal td {
  height: 52px; vertical-align: top; text-align: center;
  border-top: 1px solid var(--grid); cursor: pointer; padding: 4px 0;
}
table.cal td .d { font-size: 13px; }
table.cal td.today .d {
  display: inline-block; min-width: 22px; line-height: 22px;
  background: var(--accent); color: #fff; border-radius: 11px; font-weight: 600;
}
table.cal td.selday { background: rgba(109,94,240,0.14); border-radius: 8px; }
table.cal td .marks { display: flex; gap: 3px; justify-content: center; margin-top: 4px; height: 8px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
.dot.am { background: var(--series-am); }
.dot.pm { background: var(--series-pm); }
.cal-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--ink-2); align-items: center; justify-content: center; }
.cal-legend span { display: flex; align-items: center; gap: 5px; }

/* 演習（過去問） */
.mode-btn { display: block; width: 100%; text-align: left; padding: 14px; margin-bottom: 10px; border-radius: 14px; }
.mode-btn .t { font-size: 16px; font-weight: 700; }
.mode-btn .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
.mode-btn.accent { background: var(--accent); color: #fff; border-color: transparent; }
.mode-btn.accent .s { color: rgba(255,255,255,.85); }
.mode-btn:disabled .t { color: var(--muted); }
.qmeta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.qmeta .src { font-size: 11px; color: var(--muted); }
.qmeta .prog { font-size: 12px; color: var(--accent); font-weight: 700; }
.qtext { font-size: 16px; line-height: 1.75; white-space: pre-wrap; word-break: break-word; margin-bottom: 14px; }
/* 図表画像（PDFから切り出し）。図は黒線on白なので背景を白固定にしてダークでも視認できるようにする */
.qimg { max-width: 100%; height: auto; display: block; margin: 0 auto 14px; background: #fff; padding: 8px; border-radius: 8px; border: 1px solid var(--border); }
.choice {
  display: flex; gap: 10px; align-items: flex-start; width: 100%; text-align: left;
  padding: 12px; margin-bottom: 8px; border-radius: 12px; line-height: 1.6;
}
.choice .k { font-weight: 800; flex-shrink: 0; width: 1.4em; }
.choice.correct { background: var(--good-bg); border-color: var(--good); }
.choice.wrong { background: var(--danger-bg); border-color: var(--danger); }
.choice.dim { opacity: .55; }
.verdict { text-align: center; font-weight: 800; font-size: 18px; margin: 10px 0 4px; }
.verdict.ok { color: var(--good); }
.verdict.ng { color: var(--danger); }
.ansline { text-align: center; font-size: 14px; color: var(--ink-2); margin-bottom: 10px; }
.ansline b { color: var(--ink-1); font-size: 16px; }
.masterpill { display:inline-block; font-size: 11px; padding: 1px 8px; border-radius: 999px; background: var(--surface-2); color: var(--ink-2); }
.masterpill.weak { background: var(--danger-bg); color: var(--danger); }
.masterpill.ok { background: var(--good-bg); color: var(--good); }
/* 「わからない」選択肢: ア〜エと区別する破線・控えめ配色 */
.choice.unknown { border-style: dashed; color: var(--muted); background: transparent; justify-content: center; }
.choice.unknown .k { width: auto; }
/* 年度別プログレスバー */
.exrow { padding: 8px 0; border-top: 1px solid var(--grid); }
.exrow:first-child { border-top: none; }
.exrow-h { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 5px; }
.exrow-h .exn { font-weight: 600; font-size: 14px; }
.exrow-h .exc { font-size: 11px; color: var(--muted); }
.pbar { display: flex; height: 8px; border-radius: 5px; overflow: hidden; background: var(--surface-2); }
.pbar .pb-ok { background: var(--good); }
.pbar .pb-weak { background: var(--danger); }
.exrow.tap { cursor: pointer; margin: 0 -6px; padding: 8px 6px; border-radius: 8px; }
.exrow.tap:active { background: var(--surface-2); }
.tapmark { color: var(--accent); font-size: 12px; }
.exgo-row { margin-top: 5px; text-align: right; }
.exgo { font-size: 11px; font-weight: 700; color: var(--accent); }
.exgo.none { color: var(--muted); font-weight: 500; }
.expl { background: var(--surface-2); border-radius: 12px; padding: 12px 14px; margin: 10px 0; font-size: 14px; line-height: 1.8; }
.expl-h { font-weight: 700; font-size: 12px; color: var(--accent); margin-bottom: 4px; }
.expl-ai { font-size: 11px; color: var(--muted); margin-top: 8px; }
.dojo-row { text-align: right; margin-top: 8px; }
.dojo-link { font-size: 11px; color: var(--muted); text-decoration: none; }
.dojo-link:hover { color: var(--accent); }

.toast {
  position: fixed; left: 50%; bottom: calc(70px + env(safe-area-inset-bottom)); transform: translateX(-50%);
  background: var(--ink-1); color: var(--page); padding: 9px 16px; border-radius: 999px; font-size: 13px;
  opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 50; white-space: nowrap;
}
.toast.show { opacity: .95; }
.rowbtns { display: flex; gap: 8px; }
.rowbtns button { flex: 1; }
.settings-row { display: flex; gap: 8px; align-items: center; margin: 8px 0; flex-wrap: wrap; }
.settings-row label { font-size: 13px; color: var(--ink-2); min-width: 4.5em; }
.muted-note { font-size: 12px; color: var(--muted); line-height: 1.7; margin-top: 6px; }
.backup button { width: 100%; margin-top: 8px; }
.backup .addrow { display: flex; gap: 8px; margin: 8px 0; }
.backup .addrow button { width: auto; flex-shrink: 0; margin-top: 0; }
.backup .addrow input { min-width: 0; }
select.mini { padding: 8px; }
</style>
</head>
<body>
<main id="main"></main>
<nav id="nav"></nav>
<div class="toast" id="toast"></div>
<!-- 収録回マニフェスト → 各回の問題ファイルをマニフェスト駆動で動的ロード（回の追加はファイル追加＋manifest1行で完結） -->
<script src="questions/manifest.js"></script>
<script>
  window.AP_QUESTIONS = [];
  window.AP_EXAMS = [];
  window.AP_REGISTER = function (meta, qs) {
    window.AP_EXAMS.push(meta);
    for (var i = 0; i < qs.length; i++) window.AP_QUESTIONS.push(qs[i]);
  };
  (function () {
    var m = window.AP_MANIFEST || { base: 'questions/', exams: [] };
    var base = m.base || 'questions/';
    for (var i = 0; i < m.exams.length; i++) {
      document.write('<script src="' + base + m.exams[i].file + '"><\/script>');
    }
  })();
</script>
<script>
'use strict';

/* ============ 問題バンク（manifest.js＋各回ファイルが window.AP_QUESTIONS/AP_EXAMS を構築） ============ */
const BANK = (typeof window !== 'undefined' && window.AP_QUESTIONS) ? window.AP_QUESTIONS : [];
const BANK_META = {
  source: (typeof window !== 'undefined' && window.AP_MANIFEST && window.AP_MANIFEST.source) || '',
  exams: (typeof window !== 'undefined' && window.AP_EXAMS) ? window.AP_EXAMS : []
};
const BANK_BY_ID = {};
BANK.forEach(q => { BANK_BY_ID[q.id] = q; });
const RESOLVE_STREAK = 2;  // 弱点を復習で連続この回数正解すると「正解」ステータスへ戻す

/* ============ 永続化 ============ */
const LS_KEY = 'apstudy.v1';
const DEFAULT_EXAM_DATE = '2026-10-28';           // 令和8年度 前期試験 科目A 実施開始日（CBT）
const DEFAULT_EXAM_NAME = '応用情報 前期(科目A)';

function defaultStore() {
  return { version: 3, examDate: DEFAULT_EXAM_DATE, examName: DEFAULT_EXAM_NAME, logs: [], mastery: {}, qmemo: {}, session: null };
}
let store = loadStore();
function loadStore() {
  let raw = null;
  try { raw = localStorage.getItem(LS_KEY); } catch (e) { raw = null; }
  if (!raw) { const s = defaultStore(); persist(s); return s; }
  let s;
  try { s = JSON.parse(raw); } catch (e) { s = defaultStore(); }
  return migrate(s);
}
function migrate(s) {
  if (!s || typeof s !== 'object') s = defaultStore();
  if (!s.examDate) s.examDate = DEFAULT_EXAM_DATE;
  if (!s.examName) s.examName = DEFAULT_EXAM_NAME;
  if (!Array.isArray(s.logs)) s.logs = [];
  if (!s.mastery || typeof s.mastery !== 'object') s.mastery = {};
  if (!s.qmemo || typeof s.qmemo !== 'object') s.qmemo = {};
  if (!('session' in s)) s.session = null;
  delete s.notes;                 // v1のノート機能は廃止
  s.logs.forEach(l => {
    l.total = Math.max(0, Number(l.total) || 0);
    l.correct = Math.max(0, Math.min(l.total, Number(l.correct) || 0));
    if (l.part !== 'pm') l.part = 'am';
    if (typeof l.memo !== 'string') l.memo = '';
    if (l.source !== 'practice') l.source = 'manual';
    if (!l.id) l.id = uid();
  });
  // 習熟スキーマ v2→v3 移行: { seen, correctStreak, wrong } → { status:'ok'|'weak', correctStreak }
  //   旧「克服(wrong && streak>=2)」＝正解ステータスへ、旧「弱点」＝weak、旧「seenのみ(never wrong)」＝正解
  for (const qid in s.mastery) {
    const m = s.mastery[qid];
    if (m && !('status' in m)) {
      const wasWeakUnresolved = m.wrong && (m.correctStreak || 0) < RESOLVE_STREAK;
      s.mastery[qid] = { status: wasWeakUnresolved ? 'weak' : 'ok', correctStreak: m.correctStreak || 0 };
    }
  }
  s.version = 3;
  persist(s);
  return s;
}
function persist(s) { try { localStorage.setItem(LS_KEY, JSON.stringify(s || store)); } catch (e) {} }
function save() { persist(store); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/* ============ 日付ユーティリティ ============ */
function todayISO() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function isoToDate(iso) { const [y, m, d] = iso.split('-').map(Number); return new Date(y, m - 1, d); }
function toISO(dt) { return `${dt.getFullYear()}-${String(dt.getMonth() + 1).padStart(2, '0')}-${String(dt.getDate()).padStart(2, '0')}`; }
function addDays(iso, n) { const d = isoToDate(iso); d.setDate(d.getDate() + n); return toISO(d); }
const WD = ['日', '月', '火', '水', '木', '金', '土'];
function fmtMD(iso) { const d = isoToDate(iso); return `${d.getMonth() + 1}/${d.getDate()}(${WD[d.getDay()]})`; }
function daysBetween(aIso, bIso) { return Math.round((isoToDate(bIso) - isoToDate(aIso)) / 86400000); }
function daysUntilExam() { return daysBetween(todayISO(), store.examDate); }

/* ============ 集計（学習ログ） ============ */
function logDates() { return Array.from(new Set(store.logs.map(l => l.date))).sort(); }
function currentStreak() {
  const set = new Set(store.logs.map(l => l.date));
  if (set.size === 0) return 0;
  let cur = todayISO();
  if (!set.has(cur)) cur = addDays(cur, -1);
  if (!set.has(cur)) return 0;
  let n = 0;
  while (set.has(cur)) { n++; cur = addDays(cur, -1); }
  return n;
}
function weekCount() {
  const set = new Set(store.logs.map(l => l.date));
  let n = 0; for (let i = 0; i < 7; i++) if (set.has(addDays(todayISO(), -i))) n++;
  return n;
}
function logsForDate(iso) { return store.logs.filter(l => l.date === iso).sort((a, b) => a.part.localeCompare(b.part)); }
function partAgg(part) {
  let t = 0, c = 0;
  store.logs.forEach(l => { if (l.part === part) { t += l.total; c += l.correct; } });
  return { total: t, correct: c, rate: t ? c / t * 100 : null };
}
// 演習の解答を当日の practice ログに集計（カレンダー・ストリーク・サマリに自動連携）
function recordPracticeAnswer(part, isCorrect) {
  const date = todayISO();
  let log = store.logs.find(l => l.date === date && l.part === part && l.source === 'practice');
  if (!log) { log = { id: uid(), date, part, total: 0, correct: 0, memo: '', source: 'practice' }; store.logs.push(log); }
  log.total += 1; if (isCorrect) log.correct += 1;
}

/* ============ 習熟ステータス（未挑戦／正解／弱点） ============ */
// statusOf: '未挑戦'（記録なし）／'ok'（正解）／'weak'（弱点）
function statusOf(qid) { const m = store.mastery[qid]; return m ? m.status : '未挑戦'; }
function isAttempted(qid) { return !!store.mastery[qid]; }      // 挑戦済み = 正解 + 弱点
function isWeak(qid) { const m = store.mastery[qid]; return !!(m && m.status === 'weak'); }
function isOk(qid) { const m = store.mastery[qid]; return !!(m && m.status === 'ok'); }
function weakList() { return BANK.filter(q => isWeak(q.id)); }
function applyResult(qid, isCorrect) {
  let m = store.mastery[qid];
  if (!m) m = { status: isCorrect ? 'ok' : 'weak', correctStreak: 0 };
  if (isCorrect) {
    m.correctStreak = (m.correctStreak || 0) + 1;
    // 未挑戦→初正解は即「正解」。弱点は連続RESOLVE_STREAK回正解で「正解」へ戻す（「克服」ラベルは設けない）
    if (m.status !== 'weak' || m.correctStreak >= RESOLVE_STREAK) { m.status = 'ok'; m.correctStreak = 0; }
  } else {
    m.status = 'weak'; m.correctStreak = 0;
  }
  store.mastery[qid] = m;
}
// 回ごとの進捗集計: { included, attempted, correct, weak }
function examProgress(year, term) {
  const qs = BANK.filter(q => q.year === year && q.term === term);
  let correct = 0, weak = 0;
  qs.forEach(q => { if (isOk(q.id)) correct++; else if (isWeak(q.id)) weak++; });
  return { included: qs.length, attempted: correct + weak, correct, weak };
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }

    <div class="frow"><label>正答数</label>
      <input class="qn num" type="number" inputmode="numeric" min="0" value="${f.correct}" oninput="formSet('correct',this.value)" placeholder="0"><span class="sep">問正解</span>
      ${rate != null ? `<span class="accbadge" style="color:${rate >= 60 ? 'var(--good)' : 'var(--muted)'};font-size:15px">${rate}%</span>` : ''}</div>
    <div class="frow" style="align-items:flex-start"><label>メモ</label>

function startAdd(date) { state.form = newForm(date); render(); }
function cancelForm() { state.form = null; render(); }
function formSet(k, v) { if (state.form) state.form[k] = v; }
function saveForm() {
  const f = state.form; if (!f) return;
  const total = Math.max(0, Number(f.total) || 0);
  let correct = Math.max(0, Number(f.correct) || 0);
  if (total <= 0) { toast('問題数を入力してください'); return; }
  if (correct > total) correct = total;
  store.logs.push({ id: uid(), date: f.date, part: f.part, total, correct, memo: (f.memo || '').trim(), source: 'manual' });
  save(); state.form = null; render(); toast('記録しました 🎉');
}
function delLog(id) { store.logs = store.logs.filter(l => l.id !== id); save(); render(); }

/* ---- カレンダー ---- */
function viewCal() {
  const y = state.calY, m = state.calM;
  const startWd = new Date(y, m, 1).getDay();
  const days = new Date(y, m + 1, 0).getDate();
  const byDate = {};
  store.logs.forEach(l => { const d = isoToDate(l.date); if (d.getFullYear() === y && d.getMonth() === m) (byDate[l.date] || (byDate[l.date] = new Set())).add(l.part); });

  let out = '', col = 0, buf = '';
  const push = c => { buf += c; col++; if (col === 7) { out += `<tr>${buf}</tr>`; buf = ''; col = 0; } };
  for (let i = 0; i < startWd; i++) push('<td></td>');
  for (let d = 1; d <= days; d++) {
    const iso = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    const parts = byDate[iso];
    const marks = `<div class="marks">${parts && parts.has('am') ? '<span class="dot am"></span>' : ''}${parts && parts.has('pm') ? '<span class="dot pm"></span>' : ''}</div>`;
    const cls = [iso === todayISO() ? 'today' : '', iso === state.selDate ? 'selday' : ''].filter(Boolean).join(' ');
    push(`<td class="${cls}" onclick="calSelect('${iso}')"><span class="d">${d}</span>${marks}</td>`);
  }
  if (col > 0) { while (col < 7) { buf += '<td></td>'; col++; } out += `<tr>${buf}</tr>`; }
  const grid = `<table class="cal"><thead><tr>${WD.map(w => `<th>${w}</th>`).join('')}</tr></thead><tbody>${out}</tbody></table>`;

  const head = `<div class="cal-head"><button onclick="calMove(-1)">‹</button><div class="ym">${y}年${m + 1}月</div><button onclick="calMove(1)">›</button></div>`;
  const legend = `<div class="cal-legend"><span><span class="dot am"></span>午前</span><span><span class="dot pm"></span>午後</span><span class="num">学習 ${Object.keys(byDate).length}日</span></div>`;
  return `<h1>カレンダー</h1><div class="card">${head}${grid}${legend}</div>${state.selDate ? dayDetailHtml(state.selDate) : ''}`;
}
function calMove(n) { let m = state.calM + n, y = state.calY; if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; } state.calM = m; state.calY = y; render(); }
function calSelect(iso) { state.selDate = iso; state.form = null; render(); }
function dayDetailHtml(iso) {
  if (state.form && state.form.date === iso) return `<div class="card">${logFormHtml()}</div>`;
  const logs = logsForDate(iso);
  const list = logs.length ? logs.map(logItemHtml).join('') : `<div class="empty">この日の記録はありません。</div>`;
  return `<h2>${fmtMD(iso)} の記録</h2><div class="card">${list}</div>
    <button class="primary" style="width:100%;padding:12px" onclick="startAddCal('${iso}')">＋ この日に記録を追加</button>`;
}

// 年度行タップ: その回の弱点だけを復習（弱点0なら開始しない）。中断・再開はセッション機構で共通に動く。
function startYearReview(year, term) {
  const qs = shuffle(weakList().filter(q => q.year === year && q.term === term));
  if (!qs.length) { toast('この回に弱点はありません'); return; }
  state.practice = { mode: 'review', label: examLabel(year, term) + ' 復習', queue: qs.map(q => q.id), idx: 0, picked: null };
  persistSession();
  go('practice');
}

/* ============ 演習（過去問・アプリ内完結） ============ */
function shuffle(a) { const r = a.slice(); for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [r[i], r[j]] = [r[j], r[i]]; } return r; }
function examLabel(year, term) { return `令和${year}年${term === 'aki' ? '秋' : '春'}`; }
function qSource(q) { return `出典: ${examLabel(q.year, q.term)} 応用情報技術者試験 ${q.part === 'am' ? '午前' : '午後'}問題（IPA）`; }
// 過去問道場（応用情報技術者試験.com）の該当ページURL。照合用の外部リンクのみ（スクレイピング・自動ログインはしない）。
// ディレクトリコードは「元号内の年を2桁ゼロ埋め＋_haru/_aki」。令和6年秋=06_aki, 平成29年春=29_haru。
function dojoUrl(q) {
  const dir = `${String(q.year).padStart(2, '0')}_${q.term}`;
  return q.part === 'am'
    ? `https://www.ap-siken.com/kakomon/${dir}/q${q.qnum}.html`
    : `https://www.ap-siken.com/kakomon/${dir}/pm${String(q.qnum).padStart(2, '0')}.html`;
}

const UNKNOWN = '?';   // 「わからない」の内部値
// 進捗バー（正解=緑・弱点=赤・未挑戦=灰）
function progressBarHtml(pr) {
  const okPct = pr.included ? pr.correct / pr.included * 100 : 0;
  const weakPct = pr.included ? pr.weak / pr.included * 100 : 0;
  return `<div class="pbar"><span class="pb-ok" style="width:${okPct}%"></span><span class="pb-weak" style="width:${weakPct}%"></span></div>`;
}
// tappable=true で年度行を「その回の弱点復習」開始ボタンにする（弱点0は非活性＋「弱点なし」）
function examSummaryHtml(tappable) {
  if (!BANK_META.exams.length) return '<div class="empty">なし</div>';
  return BANK_META.exams.map(e => {
    const pr = examProgress(e.year, e.term);
    const canReview = !!tappable && pr.weak > 0;
    const rowAttr = canReview
      ? `class="exrow tap" role="button" tabindex="0" onclick="startYearReview(${e.year},'${e.term}')"`
      : 'class="exrow"';
    const go = !tappable ? '' : (pr.weak > 0
      ? `<div class="exgo-row"><span class="exgo">この回の弱点を復習 ▶</span></div>`
      : `<div class="exgo-row"><span class="exgo none">弱点なし</span></div>`);
    return `<div ${rowAttr}>
      <div class="exrow-h"><span class="exn">${esc(e.label)}${canReview ? ' <span class="tapmark">▶</span>' : ''}</span>
        <span class="exc num">収録${pr.included}問中 挑戦${pr.attempted}・<b style="color:var(--good)">正解${pr.correct}</b>・<b style="color:var(--danger)">弱点${pr.weak}</b></span></div>
      ${progressBarHtml(pr)}${go}</div>`;
  }).join('');
}
// 中断セッションが有効か（キューの問題が現バンクに存在し、まだ残りがある）
function validSession() {
  const s = store.session;
  return !!(s && Array.isArray(s.queue) && s.queue.length && s.idx < s.queue.length && s.queue.every(id => BANK_BY_ID[id]));
}
function persistSession() {
  const p = state.practice;
  store.session = (p && p.idx < p.queue.length) ? { mode: p.mode, label: p.label, queue: p.queue, idx: p.idx, picked: p.picked } : null;
  save();
}

function viewPractice() {
  if (!BANK.length) {
    return `<h1>過去問演習</h1><div class="card"><div class="empty">問題データが読み込めませんでした。<br>オンラインで開き直してください。</div></div>`;
  }
  if (state.practice) return viewQuiz();
  // モード選択
  const weak = weakList().length;
  const okN = BANK.filter(q => isOk(q.id)).length;
  const attemptedN = BANK.filter(q => isAttempted(q.id)).length;

  // 中断からの再開
  let resume = '';
  if (validSession()) {
    const s = store.session;
    resume = `<button class="mode-btn accent" onclick="resumeSession()">
      <div class="t">▶ 前回の続きから（${s.idx + 1}問目〜）</div>
      <div class="s">${esc(s.label)}・${s.queue.length}問中 ${s.idx + 1}問目から再開</div></button>`;
  }

    `<option value="${e.year}_${e.term}" ${state.pickYear === e.year && state.pickTerm === e.term ? 'selected' : ''}>${esc(e.label)}（${e.included}問）</option>`).join('');

    </div>
    <button class="mode-btn" onclick="startPractice('review')" ${weak ? '' : 'disabled'}>

      <div class="s">${weak ? '弱点の問題だけを再出題。連続2回正解で「正解」に戻ります。' : '弱点の問題はまだありません'}</div></button>`;

  const stats = `<h2>習熟状況</h2><div class="statgrid">
    <div class="kpi"><div class="v">${attemptedN}<small>問</small></div><div class="l">挑戦済み</div></div>
    <div class="kpi"><div class="v" style="color:var(--good)">${okN}<small>問</small></div><div class="l">正解</div></div>
    <div class="kpi"><div class="v" style="color:var(--danger)">${weak}<small>問</small></div><div class="l">弱点</div></div>
  </div>
  <div class="hint">解答は自動で学習ログに記録されます。「わからない」も不正解として弱点に入ります。<br>年度別の進捗と「回ごとの弱点復習」は <b>「年度別」タブ</b> から。<br>${esc(BANK_META.source || '出典: 情報処理推進機構(IPA) 過去問題')}</div>`;

  return `<h1>過去問演習</h1>${resume}${menu}${stats}`;

function pickExam(v) { const [y, t] = v.split('_'); state.pickYear = Number(y); state.pickTerm = t; }
function startPractice(mode) {
  let qs;
  let label;
  if (mode === 'random') { qs = shuffle(BANK); label = 'ランダム出題'; }
  else if (mode === 'year') {
    qs = BANK.filter(q => q.year === state.pickYear && q.term === state.pickTerm);
    label = examLabel(state.pickYear, state.pickTerm);
  } else { qs = shuffle(weakList()); label = '復習モード'; }
  if (!qs.length) { toast('対象の問題がありません'); return; }
  state.practice = { mode, label, queue: qs.map(q => q.id), idx: 0, picked: null };
  persistSession();
  render();
}
function resumeSession() {
  if (!validSession()) { toast('再開できるセッションがありません'); render(); return; }
  const s = store.session;
  state.practice = { mode: s.mode, label: s.label, queue: s.queue.slice(), idx: s.idx, picked: s.picked || null };
  render();
}
function viewQuiz() {
  const p = state.practice;
  if (p.idx >= p.queue.length) {
    return `<h1>${esc(p.label)}</h1><div class="card review-card" style="text-align:center;padding:26px 16px">
      <div style="font-size:24px;font-weight:800;margin-bottom:6px">🎉 セット完了！</div>
      <div class="hint">結果は学習ログ・年度別サマリに反映されています。</div>
      <button class="primary" style="width:100%;padding:13px;margin-top:16px" onclick="endPractice()">演習トップに戻る</button></div>`;
  }
  const q = BANK_BY_ID[p.queue[p.idx]];
  const memo = store.qmemo[q.id] || '';
  const answered = p.picked != null;
  const stPill = isOk(q.id) ? '<span class="masterpill ok">正解</span>' : (isWeak(q.id) ? '<span class="masterpill weak">弱点</span>' : '');

  const meta = `<div class="qmeta"><span class="prog">${p.idx + 1} / ${p.queue.length}</span>${stPill}</div>
    <div class="qmeta"><span class="src">${esc(qSource(q))}</span></div>`;

  const keys = ['ア', 'イ', 'ウ', 'エ'];
  let choices = keys.map(k => {
    let cls = 'choice';
    if (answered) {
      if (k === q.answer) cls += ' correct';
      else if (k === p.picked) cls += ' wrong';
      else cls += ' dim';
    }
    const oc = answered ? '' : `onclick="answerQuiz('${k}')"`;
    return `<button class="${cls}" ${oc}><span class="k">${k}</span><span>${esc(q.choices[k] || '')}</span></button>`;
  }).join('');
  // 5番目の「わからない」（ア〜エと区別できるスタイル）。選択＝不正解扱い。
  let ukCls = 'choice unknown';
  if (answered) ukCls += (p.picked === UNKNOWN) ? ' wrong' : ' dim';
  const ukOc = answered ? '' : `onclick="answerQuiz('${UNKNOWN}')"`;
  choices += `<button class="${ukCls}" ${ukOc}><span class="k">?</span><span>わからない</span></button>`;

  let after = '';
  if (answered) {
    const ok = p.picked === q.answer;
    after = `<div class="verdict ${ok ? 'ok' : 'ng'}">${ok ? '正解 ⭕' : '不正解 ❌'}</div>
      <div class="ansline">正解: <b>${q.answer}</b></div>
      ${q.explanation ? `<div class="expl"><div class="expl-h">解説</div>${esc(q.explanation)}<div class="expl-ai">※この解説はAIが生成したものです。正確さは公式解答例等で確認してください。</div></div>` : `<div class="expl expl-none"><div class="expl-h">解説</div><div class="muted-note" style="padding:2px 0">この問題の解説は準備中です。まずは正解と道場の解説で確認してください。</div></div>`}
      <div class="dojo-row"><a class="dojo-link" href="${dojoUrl(q)}" target="_blank" rel="noopener">道場で照合 ↗</a></div>
      <div style="margin:8px 0 4px;font-size:12px;color:var(--muted)">メモ（任意）</div>
      <textarea oninput="setQMemo('${q.id}',this.value)" placeholder="この問題のメモ・覚え方など">${esc(memo)}</textarea>
      <button class="primary" style="width:100%;padding:13px;margin-top:10px" onclick="nextQuiz()">
        ${p.idx + 1 >= p.queue.length ? '結果を見る' : '次の問題 →'}</button>`;
  }

  return `<div style="display:flex;align-items:center;gap:8px;padding:10px 2px">
      <button onclick="endPractice()" style="padding:6px 10px">‹ 中断</button>
      <div style="font-weight:700">${esc(p.label)}</div>
      <div style="margin-left:auto;font-size:11px;color:var(--muted)">中断しても続きから再開できます</div></div>
    <div class="card">${meta}<div class="qtext">${esc(q.text)}</div>${q.img ? `<img class="qimg" src="${esc(q.img)}" alt="図表" loading="lazy">` : ''}${choices}${after}</div>`;
}
function answerQuiz(k) {
  const p = state.practice; if (!p || p.picked != null) return;
  const q = BANK_BY_ID[p.queue[p.idx]];
  p.picked = k;
  const ok = k === q.answer;   // 「わからない」(UNKNOWN)は正解と一致しない＝不正解
  applyResult(q.id, ok);
  recordPracticeAnswer(q.part, ok);
  persistSession();
  render();
}
function nextQuiz() {
  const p = state.practice; if (!p) return;
  p.idx++; p.picked = null;
  persistSession();            // 完了したら store.session は null になる
  render(); const m = document.getElementById('main'); if (m) m.scrollTo(0, 0);
}
function setQMemo(qid, v) { const t = (v || '').trim(); if (t) store.qmemo[qid] = t; else delete store.qmemo[qid]; save(); }
// 中断: 演習ビューを閉じるが store.session は残す（再開可能）
function endPractice() { state.practice = null; render(); }

function setExamDate(v) { if (v) { store.examDate = v; save(); render(); } }

function exportJson() {

function importData(input) {
  const file = input.files && input.files[0]; if (!file) { return; }
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || !Array.isArray(data.logs)) throw new Error('形式が違います');
      if (!confirm(`インポートすると現在のデータを置き換えます。よろしいですか？`)) { input.value = ''; return; }
      store = migrate(data);
      save(); render(); alert('インポート完了');
    } catch (e) { alert('インポート失敗: ' + (e && e.message || e)); }
    input.value = '';
  };

}
function wipeAll() {

  if (!confirm('本当に削除しますか？（エクスポートしていないデータは戻せません）')) return;
  try { localStorage.removeItem(LS_KEY); } catch (e) {}
  store = loadStore(); state.practice = null; render();

/* ================= クラウド自動バックアップ（家計簿・筋トレアプリと同一仕様） ================= */
// アプリを開いたとき1日1回、非公開GitHubリポジトリへ全データをアップロードする。
// トークン（Fine-grained PAT）は端末のlocalStorageにのみ保存され、エクスポートにも含まれない。
const CLOUD_REPO = 'prkxfzmfx-pixel/app-backups';
const CLOUD_FILE = 'apstudy.json';
const CLOUD_TOKEN_KEY = 'apstudy.cloudToken';
const CLOUD_META_KEY = 'apstudy.cloudMeta';
function cloudMeta() { try { return JSON.parse(localStorage.getItem(CLOUD_META_KEY) || '{}'); } catch (e) { return {}; } }
function setCloudMeta(m) { try { localStorage.setItem(CLOUD_META_KEY, JSON.stringify(m)); } catch (e) {} }
function b64utf8(s) { const bytes = new TextEncoder().encode(s); let bin = ''; for (const b of bytes) bin += String.fromCharCode(b); return btoa(bin); }
function cloudApi() { return `https://api.github.com/repos/${CLOUD_REPO}/contents/${CLOUD_FILE}`; }
function cloudHeaders(token) { return { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github+json' }; }
function recordCount(s) { return ((s && Array.isArray(s.logs)) ? s.logs.length : 0) + ((s && s.mastery) ? Object.keys(s.mastery).length : 0); }
async function cloudBackup(force) {
  const token = localStorage.getItem(CLOUD_TOKEN_KEY);
  if (!token) return { skipped: 'no-token' };
  const today = todayISO();
  if (!force && cloudMeta().last === today) return { skipped: 'done-today' };
  try {
    // GETは必ずcache:'no-store'。直前の別Accept形式のGET（トークン保存時のraw取得等）が
    // HTTPキャッシュから返ると sha が取れず、既存ファイルへのPUTが422になるため。
    const fetchSha = async () => {
      const g = await fetch(cloudApi(), { headers: cloudHeaders(token), cache: 'no-store' });
      return g.status === 200 ? (await g.json()).sha : undefined;
    };
    const put = sha => fetch(cloudApi(), {
      method: 'PUT', headers: cloudHeaders(token),
      body: JSON.stringify({ message: '自動バックアップ ' + today, content: b64utf8(JSON.stringify(store)), ...(sha ? { sha } : {}) }),
    });
    let res = await put(await fetchSha());
    if (res.status === 422 || res.status === 409) {
      // sha欠落（キャッシュ由来）や並行更新との競合。shaを取り直して1回だけ再試行
      res = await put(await fetchSha());
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    setCloudMeta({ last: today, ok: true });
    if (state.tab === 'settings') render();
    return { ok: true };
  } catch (e) {
    setCloudMeta({ ...cloudMeta(), ok: false, err: String(e && e.message || e) });
    if (state.tab === 'settings') render();
    return { error: String(e && e.message || e) };
  }
}
function cloudSettingsHtml() {
  const meta = cloudMeta();
  const tokenSet = !!localStorage.getItem(CLOUD_TOKEN_KEY);
  let status;
  if (!tokenSet) status = '未設定（かんたん設定コードかトークンを入れると有効になります）';
  else if (!meta.last) status = 'トークン設定済み・バックアップ未実行';
  else status = `最終バックアップ: ${meta.last}` + (meta.ok === false ? `　⚠️前回エラー: ${esc(meta.err || '')}` : ' ✅');
  return `
    <div class="hint">アプリを開いたとき1日1回、非公開リポジトリ（${CLOUD_REPO}）へ自動バックアップします。過去の世代も履歴に残ります。</div>
    <div style="font-size:13px">${status}</div>
    <div class="addrow">
      <input type="password" id="cloudPin" inputmode="numeric" maxlength="6" placeholder="かんたん設定コード（6桁）" style="flex:1">
      <button class="primary" onclick="applyPinToken()">適用</button>
    </div>
    <div class="addrow">
      <input type="password" id="cloudToken" placeholder="${tokenSet ? '設定済み（変更時のみ入力）' : 'GitHubトークンを貼り付け'}" style="flex:1">
      <button class="primary" onclick="saveCloudToken()">保存</button>
    </div>
    <button onclick="cloudBackupNow()">☁️ 今すぐバックアップ</button>
    <button onclick="cloudRestore()">⬇️ クラウドから復元</button>
    ${tokenSet ? '<button class="danger" onclick="clearCloudToken()">バックアップ停止（トークン削除）</button>' : ''}`;
}
/* かんたん設定: 6桁コードを入力すると、埋め込みの暗号文(PIN_BLOB)からトークンを復号して適用する。
   PIN_BLOB は base64(salt16 | iv12 | AES-GCM暗号文)。コード本体・平文トークンはリポジトリに置かない。
   暗号文の生成: node tools\make-pin-blob.js <6桁コード> <トークン>（ローカル実行のみ）。
   ※未登録（空）の間は「トークン直接貼り付け」で有効化できる。 */
const PIN_BLOB = 'i+oiLO85KxbYcho8jldYOAvAwT66EU1pPCHGWP6uQ6kVkm9R8Qp0om1grlkvqGv5u54g9wKdaN3hYTkHxNBfJAfVxhbQh9dQw4X47tkyHQtp9uiSdMN2erH2dcOKaUG0k2b3tlsY4JO5ttyFmzCU6dQ8bVSLARF9FaDvP+hiJYGsJWtDBHFnh6I=';
async function decryptWithPin(pin, blobB64) {
  const raw = Uint8Array.from(atob(blobB64), ch => ch.charCodeAt(0));
  const salt = raw.slice(0, 16), iv = raw.slice(16, 28), ct = raw.slice(28);
  const keyMat = await crypto.subtle.importKey('raw', new TextEncoder().encode(pin), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: 310000, hash: 'SHA-256' },
    keyMat, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}
async function applyPinToken() {
  const pin = document.getElementById('cloudPin').value.trim();
  if (!PIN_BLOB) { alert('この端末のアプリにはかんたん設定コードが未登録です。GitHubトークンを直接貼り付けて保存してください。'); return; }
  let token;
  try {
    if (!/^\d{6}$/.test(pin)) throw new Error('bad pin');
    token = await decryptWithPin(pin, PIN_BLOB);
  } catch (e) { alert('パスワードが間違っています'); return; }
  document.getElementById('cloudToken').value = token;
  await saveCloudToken();
}
async function saveCloudToken() {
  const v = document.getElementById('cloudToken').value.trim();
  if (!v) { alert('トークンを入力してください'); return; }
  localStorage.setItem(CLOUD_TOKEN_KEY, v);
  try {
    const res = await fetch(cloudApi(), { headers: { 'Authorization': 'Bearer ' + v, 'Accept': 'application/vnd.github.raw+json' }, cache: 'no-store' });
    if (res.ok) {
      const s = JSON.parse(await res.text());
      if (s && Array.isArray(s.logs) && recordCount(s) > recordCount(store) &&
          confirm(`クラウドに既存のバックアップ（記録${recordCount(s)}件）が見つかりました。この端末に復元しますか？\n\n（キャンセルすると、この端末のデータが今後のバックアップとして上書きされます）`)) {
        store = migrate(s); save(); setCloudMeta({ last: todayISO(), ok: true }); render();
        alert('復元完了。自動バックアップも有効になりました'); return;
      }
    } else if (res.status !== 404) { throw new Error('HTTP ' + res.status); }
    const r = await cloudBackup(true);
    alert(r.ok ? '設定完了。バックアップに成功しました' : 'バックアップ失敗: ' + (r.error || ''));
    render();
  } catch (e) {
    alert('接続失敗: ' + (e && e.message || e) + '\nトークンの権限（app-backupsリポのContents: Read and write）を確認してください');
    render();
  }
}
function clearCloudToken() {
  if (!confirm('自動バックアップを停止しますか？（トークンを削除。クラウド上の既存バックアップは残ります）')) return;
  localStorage.removeItem(CLOUD_TOKEN_KEY); render();
}
function cloudBackupNow() {
  cloudBackup(true).then(r => alert(r.ok ? 'バックアップ完了' : (r.skipped === 'no-token' ? 'トークンが未設定です' : 'バックアップ失敗: ' + (r.error || ''))));
}
async function cloudRestore() {
  const token = localStorage.getItem(CLOUD_TOKEN_KEY);
  if (!token) { alert('トークンが未設定です'); return; }
  try {
    const res = await fetch(cloudApi(), { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.raw+json' }, cache: 'no-store' });
    if (!res.ok) throw new Error(res.status === 404 ? 'クラウドにバックアップがまだありません' : 'HTTP ' + res.status);
    const s = JSON.parse(await res.text());
    if (!s || !Array.isArray(s.logs)) throw new Error('形式が違います');
    if (!confirm(`クラウドのバックアップ（記録${recordCount(s)}件）で現在のデータを置き換えます。よろしいですか？`)) return;
    store = migrate(s); save(); render(); alert('復元完了');
  } catch (e) { alert('復元失敗: ' + (e && e.message || e)); }
}

/* ---- トースト ---- */
let toastTimer = null;
function toast(msg) {
  const t = document.getElementById('toast'); if (!t) return;
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1600);
}

/* ---- ビューポート ---- */
function fitViewport() {
  const h = (window.navigator && window.navigator.standalone && window.screen && window.screen.height) ? window.screen.height : window.innerHeight;
  document.documentElement.style.setProperty('--appH', h + 'px');
}

/* ---- 起動 ---- */
if (typeof document !== 'undefined' && document.getElementById && document.getElementById('main')) {
  window.addEventListener('resize', fitViewport);
  fitViewport();
  render();
  cloudBackup();
  // アプリを閉じずに日をまたいで前面復帰したときもバックアップされるように
  document.addEventListener('visibilitychange', () => { if (!document.hidden) cloudBackup(); });
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
}

/* ---- テスト用エクスポート ---- */
if (typeof module !== 'undefined' && module.exports) {
  module.exports = {
    get store() { return store; }, set store(v) { store = v; },
    state, defaultStore, migrate,
    go, render, startAdd, formSet, saveForm, delLog, currentStreak, weekCount, weekCountFn: weekCount,
    partAgg, logDates, recordPracticeAnswer, viewSummary, examSummaryHtml, startYearReview,
    calSelect, startAddCal, calMove,
    statusOf, isAttempted, isWeak, isOk, weakList, applyResult, examProgress, validSession, persistSession, resumeSession,
    startPractice, answerQuiz, nextQuiz, endPractice, setQMemo, pickExam, qSource, examLabel, dojoUrl, UNKNOWN,
    setExamDate, setExamName, resetExam, resetProgress, daysUntilExam, daysBetween, todayISO, addDays,
    exportJson, importData, wipeAll, cloudBackup, cloudSettingsHtml, decryptWithPin, applyPinToken, saveCloudToken, cloudRestore, recordCount,
    BANK, BANK_META, BANK_BY_ID, _ls: LS_KEY,
  };
}
